<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Filtragem — Projeto Anhembi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="celular">
    <div class="conteudo">
      <div class="topo">
        <input class="barra-pesquisa" type="text" placeholder="Pesquisa" aria-label="Pesquisa">
        <a class="botao-filtro" href="filtragem.html" title="Filtrar">
          <img src="img/filtro.png" alt="Filtros">
        </a>
      </div>

      <div class="titulo-secao"><span>Filtragem</span></div>

      <div class="grade-filtros">
        <button class="botao-categoria">Causas</button>
        <button class="botao-categoria">ONGs</button>
        <button class="botao-categoria">Habilidades</button>
        <button class="botao-categoria">Vagas</button>
      </div>

      <input class="campo-endereco" type="text" placeholder="Digite seu endereço ou CEP" aria-label="Endereço ou CEP">

      <button class="botao-azul botao-filtrar" onclick="window.location.href='home.html'">Filtrar</button>
    </div>

    <nav class="menu-inferior">
      <a href="perfil.html" title="Perfil"><img src="img/usuario-contorno.png" alt="Perfil"></a>
      <a href="feedback.html" title="Feedback"><img src="img/chat-contorno.png" alt="Feedback"></a>
      <a href="home.html" title="Home"><img src="img/casa-contorno.png" alt="Home"></a>
      <a href="horas.html" title="Horas"><img src="img/relogio-contorno.png" alt="Horas"></a>
      <a href="notificacoes.html" title="Notificações"><img src="img/sino-contorno.png" alt="Notificações"></a>
    </nav>
  </div>

  <script>
    // Permite marcar/desmarcar as categorias do filtro
    document.querySelectorAll('.botao-categoria').forEach(function (botao) {
      botao.addEventListener('click', function () {
        botao.classList.toggle('selecionado');
      });
    });
  </script>
</body>
</html>

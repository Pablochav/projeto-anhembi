<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Projeto Anhembi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="celular login">
    <div class="login-conteudo">
      <h1>Seja bem-vindo!</h1>

      <form action="home.html">
        <input class="campo" type="text" placeholder="Login" aria-label="Login">
        <input class="campo" type="password" placeholder="Senha" aria-label="Senha">
        <button class="botao-branco" type="submit">Entrar</button>
      </form>

      <a class="esqueci-senha" href="#">Esqueci minha senha</a>

      <div class="divisor"><span>ou se preferir</span></div>

      <a class="botao-branco botao-social" href="home.html">Entrar com o Facebook</a>
      <a class="botao-branco botao-social" href="home.html">Entrar com o Google+</a>
    </div>
  </div>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Suas horas — Projeto Anhembi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="celular">
    <div class="conteudo">
      <div class="topo">
        <input class="barra-pesquisa" type="text" placeholder="Pesquisa" aria-label="Pesquisa">
        <a class="botao-filtro" href="filtragem.html" title="Filtrar">
          <img src="img/filtro.png" alt="Filtros">
        </a>
      </div>

      <div class="titulo-secao"><span>Suas horas</span></div>

      <section class="cartao-branco cartao-horas">
        <div class="barra-progresso">
          <!-- 30 de 240 horas = 12,5% -->
          <div class="preenchimento" style="width: 12.5%"></div>
        </div>
        <div class="rotulos-progresso">
          <span>0%</span>
          <span>100%</span>
        </div>

        <div class="caixa-horas">
          <p class="rotulo">Horas concluidas :</p>
          <p class="valor">30 horas</p>
        </div>

        <div class="caixa-horas">
          <p class="rotulo">Horas faltantes :</p>
          <p class="valor">210 horas</p>
        </div>

        <div class="caixa-horas">
          <p class="rotulo">Horas totais :</p>
          <p class="valor">240 horas</p>
        </div>
      </section>

      <button class="botao-azul botao-certificado" onclick="alert('Função de adicionar certificado em breve!')">Adicionar certificado</button>
    </div>

    <nav class="menu-inferior">
      <a href="perfil.html" title="Perfil"><img src="img/usuario-contorno.png" alt="Perfil"></a>
      <a href="feedback.html" title="Feedback"><img src="img/chat-contorno.png" alt="Feedback"></a>
      <a href="home.html" title="Home"><img src="img/casa-contorno.png" alt="Home"></a>
      <a href="horas.html" title="Horas"><img src="img/relogio-cheio.png" alt="Horas"></a>
      <a href="notificacoes.html" title="Notificações"><img src="img/sino-contorno.png" alt="Notificações"></a>
    </nav>
  </div>
</body>
</html>
